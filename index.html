<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDL Studio | Oracle APEX Consultants</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Lora', 'Georgia', 'serif'],
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        petal:   '#FEF0F2',
                        blossom: '#D97A8C',
                        cherry:  '#CA274F',
                        bark:    '#2C1B1E',
                        mist:    '#9B8E91',
                        branch:  '#7A3347',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-petal text-bark font-sans antialiased">

    <!-- Hero -->
    <section class="min-h-screen flex flex-col justify-center px-8 md:px-20 pt-24 ml-8 md:ml-20">
        <div class="max-w-5xl">

            <!-- Vignettes -->
            <div class="flex flex-col gap-4 mb-14">

                <!-- FDL Studio card -->
                <div class="flex items-center gap-5">
                    <div class="w-16 h-16 rounded-2xl bg-[#FB8C9B] flex-shrink-0 flex items-center justify-center">
                        <img src="lis-sakura.png" alt="" class="w-10 h-10 object-contain">
                    </div>
                    <div class="flex flex-col leading-snug">
                        <span class="font-serif text-2xl font-semibold tracking-[0.15em] uppercase text-bark">FDL Studio</span>
                        <span class="text-xs font-medium tracking-widest uppercase text-mist mt-1">Oracle APEX Consulting</span>
                    </div>
                </div>

                <!-- Client card -->
                <div class="flex items-center gap-5">
                    <div class="w-16 h-16 flex items-center justify-center flex-shrink-0">
                        <img src="mtl.png" alt="Ville de Montréal" class="w-4 h-4 object-contain">
                    </div>
                    <div class="flex flex-col leading-snug">
                        <span class="text-sm font-medium text-cherry">We build what</span>
                        <span class="text-sm font-medium text-cherry">matters to</span>
                        <span class="text-sm font-medium text-cherry">your business.</span>
                    </div>
                </div>

            </div>

            <p class="text-lg md:text-xl text-mist font-light leading-relaxed max-w-xl mb-14">
                Senior Oracle APEX consultants specializing in enterprise applications,
                intelligent automation, and cloud architecture — built to last.
            </p>

            <a href="mailto:contact@fdlstudio.net"
                class="inline-flex items-center gap-3 text-sm font-medium tracking-widest uppercase text-bark hover:text-branch transition-colors duration-300 group">
                Start a conversation
                <span class="block w-8 h-px bg-blossom group-hover:bg-cherry group-hover:w-12 transition-all duration-300"></span>
            </a>

            <!-- Social icons -->
            <div class="flex items-center gap-3 mt-10 text-blossom">
                <a href="https://linkedin.com" target="_blank" class="text-blossom hover:text-cherry transition-colors duration-300">

                </a>
                <a href="https://x.com" target="_blank" class="text-blossom hover:text-cherry transition-colors duration-300">

            </div>

        </div>
    </section>

</body>
</html>
